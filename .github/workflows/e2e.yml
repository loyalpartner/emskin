name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: Nested-host E2E
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libinput-dev \
            libgbm-dev \
            libseat-dev \
            libpixman-1-dev \
            libssl-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinput-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xkb-dev \
            libxcb-dpms0-dev \
            libxcb-res0-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype-dev \
            libegl1 \
            libgles2 \
            xvfb \
            xwayland \
            x11-utils \
            xauth \
            wl-clipboard \
            xclip \
            ffmpeg

      - name: Install Rust toolchain (from crates/emskin/rust-toolchain.toml)
        working-directory: crates/emskin
        run: rustup show

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build tests (emskin) + emez host
        run: |
          cargo build -p emez
          cargo build --tests -p emskin

      - name: Run E2E suite
        run: |
          cargo test -p emskin \
            --test e2e_smoke \
            --test e2e_capture \
            --test e2e_clipboard_wayland \
            --test e2e_clipboard_x11

      - name: Upload host logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-host-logs
          path: |
            /tmp/emskin-host-*/emez.log
            /tmp/emskin-host-*/xwayland.log
            /tmp/emskin-host-x11-*/Xvfb.log
            /tmp/emskin-e2e-*.log
          if-no-files-found: ignore
