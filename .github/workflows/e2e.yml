name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  e2e:
    name: Nested-host E2E
    runs-on: ubuntu-latest
    # Run inside Arch so we can install xwayland-satellite from the
    # official repo (it is not on crates.io and not packaged by Ubuntu).
    # base-devel pulls in gcc + pkgconf + make required by Rust crates'
    # build.rs scripts (smithay, wayland-sys, x11rb-protocol, …).
    container:
      image: archlinux:base-devel
    steps:
      - name: Install system dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            git \
            rustup \
            wayland \
            libxkbcommon \
            libxkbcommon-x11 \
            xkeyboard-config \
            libinput \
            mesa \
            libglvnd \
            seatd \
            pixman \
            openssl \
            libxcb \
            xcb-util-cursor \
            xcb-util-wm \
            fontconfig \
            ttf-dejavu \
            freetype2 \
            xorg-server-xvfb \
            xorg-xwayland \
            xorg-xkbcomp \
            xorg-xdpyinfo \
            xorg-xauth \
            wl-clipboard \
            xclip \
            ffmpeg \
            xwayland-satellite

      # Arch container is bare — no display manager / systemd has ever
      # created /tmp/.X11-unix, so smithay's `pre_bind_unix_socket` for
      # XWayland fails with ENOENT before tracing even initialises. The
      # 1777 sticky bit matches what xorg-server's tmpfiles.d ships.
      - name: Create /tmp/.X11-unix
        run: |
          mkdir -p /tmp/.X11-unix
          chmod 1777 /tmp/.X11-unix

      - uses: actions/checkout@v4

      - name: Install Rust toolchain (from crates/emskin/rust-toolchain.toml)
        run: |
          # `rustup show` inside the crate respects the toml override and
          # downloads 1.92.0, but rustup itself has no default toolchain
          # set on a fresh Arch install — subsequent `cargo` invocations
          # from the workspace root would fail with "rustup could not
          # choose a version of cargo to run". Pin the same channel
          # globally to keep workspace-root commands working.
          (cd crates/emskin && rustup show)
          rustup default 1.92.0

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Build tests (emskin) + emez host
        run: |
          cargo build -p emez
          cargo build --tests -p emskin

      - name: Run E2E suite
        run: |
          cargo test -p emskin \
            --test e2e_smoke \
            --test e2e_capture \
            --test e2e_clipboard_wayland \
            --test e2e_clipboard_x11

      - name: Upload host logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-host-logs
          path: |
            /tmp/emskin-host-*/emez.log
            /tmp/emskin-host-*/xwayland.log
            /tmp/emskin-host-x11-*/Xvfb.log
            /tmp/emskin-e2e-*.log
          if-no-files-found: ignore
