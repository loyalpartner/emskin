name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    container:
      image: archlinux:latest
    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git rustup \
            wayland wayland-protocols \
            libxkbcommon libxkbcommon-x11 \
            libinput seatd mesa \
            libx11 libxcb xcb-util-cursor \
            fontconfig freetype2 \
            xorg-xwayland

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        working-directory: emskin
        run: |
          rustup default stable
          rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            emskin/target
          key: arch-${{ matrix.arch }}-release-${{ hashFiles('emskin/Cargo.lock', 'emskin/Cargo.toml') }}
          restore-keys: arch-${{ matrix.arch }}-release-

      - name: Build release
        working-directory: emskin
        run: cargo build --release

      - name: Strip binary
        run: strip emskin/target/release/emskin

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Package tarball
        run: |
          staging=$(mktemp -d)
          cp emskin/target/release/emskin "$staging/"
          cp LICENSE "$staging/"
          tar czf emskin-${{ steps.version.outputs.version }}-${{ matrix.arch }}.tar.gz -C "$staging" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emskin-${{ matrix.arch }}
          path: emskin-${{ steps.version.outputs.version }}-${{ matrix.arch }}.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: emskin-*.tar.gz
