name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build & Release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    permissions:
      contents: write
    steps:
      - name: Install base dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel git rustup \
            wayland wayland-protocols \
            libxkbcommon libxkbcommon-x11 \
            libinput seatd mesa \
            libx11 libxcb xcb-util-cursor \
            fontconfig freetype2 \
            xorg-xwayland openssh

      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        working-directory: emskin
        run: |
          rustup default stable
          rustup show
          cargo install cargo-aur

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            emskin/target
          key: arch-x86_64-release-${{ hashFiles('emskin/Cargo.lock', 'emskin/Cargo.toml') }}
          restore-keys: arch-x86_64-release-

      - name: Build and package with cargo-aur
        working-directory: emskin
        run: |
          cp ../LICENSE .
          cargo aur
          rm LICENSE

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: emskin-x86_64
          path: |
            emskin/target/cargo-aur/emskin-${{ steps.version.outputs.version }}-x86_64.tar.gz
            emskin/target/cargo-aur/PKGBUILD

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: emskin-x86_64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: emskin-*.tar.gz

  aur:
    name: Publish to AUR
    needs: release
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    steps:
      - name: Install dependencies
        run: pacman -Syu --noconfirm && pacman -S --noconfirm --needed base-devel git openssh

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: emskin-x86_64

      - name: Generate .SRCINFO
        run: |
          useradd -m builder
          cp PKGBUILD /home/builder/
          su builder -c 'cd ~ && makepkg --printsrcinfo' > .SRCINFO

      - name: Push to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          echo -e "Host aur.archlinux.org\n  IdentityFile ~/.ssh/aur\n  User aur" > ~/.ssh/config

          ssh -T aur@aur.archlinux.org || true
          git clone ssh://aur@aur.archlinux.org/emskin-bin.git aur-repo
          cp PKGBUILD .SRCINFO aur-repo/
          cd aur-repo
          git config user.name "Lee"
          git config user.email "loyalpartner@163.com"
          git add PKGBUILD .SRCINFO
          git diff --cached --quiet || {
            git commit -m "Update to v${GITHUB_REF_NAME#v}"
            git push origin master
          }
