name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    name: Check / Clippy / Fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwayland-dev \
            libxkbcommon-dev \
            libudev-dev \
            libinput-dev \
            libgbm-dev \
            libseat-dev \
            libpixman-1-dev \
            libssl-dev \
            libx11-xcb-dev \
            libxcb1-dev \
            libxcb-composite0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinput-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-dri3-dev \
            libxcb-present-dev \
            libxcb-sync-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libxcb-xkb-dev \
            libxcb-dpms0-dev \
            libxcb-res0-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxkbcommon-x11-dev \
            libfontconfig1-dev \
            libfreetype-dev

      - name: Install Rust toolchain (from crates/emskin/rust-toolchain.toml)
        working-directory: crates/emskin
        run: rustup show

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml', 'crates/*/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Fmt
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Build
        run: cargo build --workspace

  release-please:
    name: Release Please
    needs: check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # Uses the default GITHUB_TOKEN. This opens/updates the Release
          # PR automatically; after you merge it, tag + GitHub Release may
          # need to be created manually with `gh release create vX.Y.Z
          # --target <merge-sha>` (release-please sometimes aborts with
          # GITHUB_TOKEN and tags it creates don't trigger downstream
          # workflows anyway). A fine-grained PAT in secrets.RELEASE_PLEASE_TOKEN
          # would close that loop, but the manual step is short enough.
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
